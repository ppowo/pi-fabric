name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Test Windows type-checker regression
        if: runner.os == 'Windows'
        run: pnpm exec vitest run tests/type-checker.test.ts
      - name: Test
        run: pnpm test
      - name: Lint (dead code)
        run: pnpm lint:dead
      - name: Build
        run: pnpm build
